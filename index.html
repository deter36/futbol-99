<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol '99</title>
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/pitch.css">
    <link rel="stylesheet" href="styles/cards.css">
    <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>⚽ Futbol '99 ⚽</h1>
            <button id="reset-btn" class="btn btn-secondary header-btn">New Game</button>
        </header>

        <main>
            <div class="game-layout">
                <div class="game-board-container">
                    <div class="field-rotation-frame">
                        <div class="pitch-view-label pitch-view-left">LEFT</div>
                        <div class="pitch-view-label pitch-view-center">CENTER</div>
                        <div class="pitch-view-label pitch-view-right">RIGHT</div>
                        <div class="pitch-third-label pitch-view-attacking">ATTACKING</div>
                        <div class="pitch-third-label pitch-view-midfield">MIDFIELD</div>
                        <div class="pitch-third-label pitch-view-defensive">DEFENSIVE</div>
                        <div class="pitch-lane-divider pitch-lane-divider-one"></div>
                        <div class="pitch-lane-divider pitch-lane-divider-two"></div>
                        <div class="pitch-marking pitch-midfield-line"></div>
                        <div class="pitch-marking pitch-center-circle"></div>
                        <div class="pitch-marking pitch-kickoff-dot"></div>
                        <div class="pitch-marking pitch-penalty-box attack"></div>
                        <div class="pitch-marking pitch-penalty-arc attack"></div>
                        <div class="pitch-marking pitch-penalty-box defense"></div>
                        <div class="pitch-marking pitch-penalty-arc defense"></div>
                        <div id="soccer-field" class="soccer-field" role="grid" aria-label="Soccer field">
                            <!-- Field will be generated by JS -->
                        </div>
                    </div>
                </div>
               
                <aside class="game-status-panel">
                    <div class="status-section score-section">
                        <h2>SCORE</h2>
                        <div class="score-display">
                            <div class="score-item player-score">
                                <span class="score-label">YOU</span>
                                <span id="player-score" class="score-value">0</span>
                            </div>
                            <div class="score-divider">-</div>
                            <div class="score-item ai-score">
                                <span class="score-label">AI</span>
                                <span id="ai-score" class="score-value">0</span>
                            </div>
                        </div>
                    </div>
                   
                    <div class="status-section turn-section">
                        <div class="turn-display">
                            <span id="current-turn" class="turn-indicator">Your Turn</span>
                        </div>
                    </div>
                   
                    <div class="status-section resources-section">
                        <div class="resource-item">
                            <span class="resource-icon">🎴</span>
                            <span class="resource-label">Draw Pile</span>
                            <span id="deck-count" class="resource-value">10</span>
                        </div>
                        <div class="resource-item">
                            <span class="resource-icon">🗑️</span>
                            <span class="resource-label">Discard</span>
                            <span id="discard-count" class="resource-value">0</span>
                        </div>
                    </div>
                   
                    <div class="button-section">
                        <button id="manual-control-btn" class="btn btn-secondary">🤖 Manual Mode: OFF</button>
                        <button id="finish-movement-btn" class="btn btn-primary" style="display: none;">Finish Movement</button>
                        <button id="end-turn-btn" class="btn btn-primary">End Turn</button>
                        <button id="end-reposition-btn" class="btn btn-primary" style="display: none;">End Repositioning</button>
                        <button id="next-ai-action-btn" class="btn btn-debug" style="display: none;">⚙️ Next AI Action (DEBUG)</button>
                    </div>
                </aside>

                <aside class="cards-panel">
                    <div class="hand-container">
                        <h2>Your Hand</h2>
                        <div id="hand" class="hand" role="region" aria-label="Your hand of cards">
                            <!-- Cards will be generated by JS -->
                        </div>
                    </div>

                    <div class="market-container">
                        <h2>Market</h2>
                        <div id="market" class="market" role="region" aria-label="Card market">
                            <!-- Market cards will be generated by JS -->
                        </div>
                    </div>
                </aside>
            </div>

            <div class="log-container">
                <h3>Game Log</h3>
                <div id="game-log" class="game-log" role="log" aria-live="polite">
                    <p>Game started! Draw your cards and make your move!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Load scripts in dependency order -->
    <script src="game/settings.js"></script>
    <script src="game/state.js"></script>
    <script src="game/pitch-math.js"></script>
    <script src="game/card-definitions.js"></script>
    <script src="game/deck-management.js"></script>
    <script src="game/rules.js"></script>
    <script src="game/ai-opponent.js"></script>
    <script src="game/display.js"></script>
    <script src="game/startup.js"></script>
</body>
</html>
