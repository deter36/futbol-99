<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol '99</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
}

.game-container {
    max-width: 95vw;
    margin: 0 auto;
}

header {
    position: relative;
    text-align: center;
    margin-bottom: 15px;
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 8px;
}

h1 {
    font-size: 1.8rem;
    margin: 0;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

.header-btn {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    padding: 8px 20px;
    font-size: 0.9rem;
}

main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.game-layout {
    display: grid;
    grid-template-columns: auto minmax(430px, 1fr);
    gap: 10px;
    align-items: start;
}

.game-status-panel {
    grid-column: 1 / -1;
    grid-row: 1;
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
    align-items: stretch;
}

.cards-panel {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    position: relative;
    z-index: 2;
}

.status-section {
    background: rgba(0, 0, 0, 0.4);
    padding: 8px 12px;
    border-radius: 8px;
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.status-section h2 {
    margin: 0 0 12px 0;
    font-size: 0.9rem;
    color: #64B5F6;
    text-align: center;
    letter-spacing: 1px;
}

/* Score Section */
.score-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.score-label {
    font-size: 0.75rem;
    opacity: 0.8;
    text-transform: uppercase;
}

.score-value {
    font-size: 1.8rem;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    line-height: 1;
}

.score-divider {
    font-size: 1.3rem;
    opacity: 0.5;
}

/* Turn Section */
.turn-display {
    text-align: center;
}

.turn-indicator {
    font-size: 1rem;
    font-weight: bold;
    color: #4CAF50;
    text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
}

/* Resources Section */
.resources-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.resource-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 6px;
    text-align: center;
}

.resource-icon {
    font-size: 1.8rem;
}

.resource-label {
    font-size: 0.75rem;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.resource-value {
    font-size: 1.5rem;
    font-weight: bold;
    color: #FFD700;
}

.game-status-panel .resources-section {
    gap: 8px;
}

.game-status-panel .resource-item {
    padding: 6px 10px;
}

.game-status-panel .resource-icon,
.game-status-panel .resource-value {
    font-size: 1.1rem;
}

/* Soccer Field */
.game-board-container {
    grid-column: 1;
    grid-row: 2;
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.1);
    padding: 5px;
    border-radius: 10px;
    overflow-x: auto;
    width: fit-content;
}

.pitch-action-panel {
    width: min(100%, 620px);
    margin: 8px auto 0;
}

.game-board-container h2 {
    margin-bottom: 15px;
}

.field-rotation-frame {
    position: relative;
    width: 768px;
    height: 985px;
    background: #2d5016;
    border: 5px solid #ffffff;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    box-sizing: border-box;
    overflow: hidden;
}

.pitch-surface {
    position: absolute;
    inset: 0;
    transform-origin: center;
    transition: transform 0.2s ease;
}

.field-rotation-frame.view-red .pitch-surface {
    transform: rotate(180deg);
}

.field-rotation-frame.view-red .field-cell > * {
    transform: rotate(-90deg);
}

.pitch-view-label {
    position: absolute;
    top: 8px;
    z-index: 5;
    transform: translateX(-50%);
    pointer-events: none;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
}

.pitch-view-left { left: 17%; }
.pitch-view-center { left: 50%; }
.pitch-view-right { left: 83%; }

.pitch-third-label {
    position: absolute;
    left: 12px;
    z-index: 5;
    transform: translateY(-50%) rotate(180deg);
    writing-mode: vertical-rl;
    pointer-events: none;
    font-size: 0.64rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
}

.pitch-view-attacking { top: 17%; }
.pitch-view-midfield { top: 50%; }
.pitch-view-defensive { top: 83%; }

.pitch-lane-divider {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 3;
    width: 3px;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.45);
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.35);
}

.pitch-lane-divider-one { left: 31.75%; }
.pitch-lane-divider-two { left: 68.25%; }

.pitch-marking {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    border-color: rgba(255, 255, 255, 0.72);
}

.pitch-midfield-line {
    left: 0;
    right: 0;
    top: 50%;
    height: 2px;
    background: rgba(255, 255, 255, 0.62);
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.35);
}

.pitch-center-circle {
    left: 50%;
    top: 50%;
    width: 23%;
    aspect-ratio: 1;
    border: 3px solid rgba(255, 255, 255, 0.68);
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

.pitch-kickoff-dot {
    left: 50%;
    top: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.86);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
}

.pitch-penalty-box {
    left: 31.75%;
    width: 36.5%;
    height: 17%;
    border: 3px solid rgba(255, 255, 255, 0.68);
}

.pitch-penalty-box.attack {
    top: -3px;
}

.pitch-penalty-box.defense {
    bottom: -3px;
}

.pitch-penalty-arc {
    left: 42.5%;
    width: 15%;
    height: 8%;
    border: 3px solid rgba(255, 255, 255, 0.68);
    border-radius: 50%;
    clip-path: inset(50% -4px -4px -4px);
}

.pitch-penalty-arc.attack {
    top: 13%;
}

.pitch-penalty-arc.defense {
    bottom: 13%;
    clip-path: inset(-4px -4px 50% -4px);
}

.soccer-field {
    --hex-w: 65px;
    --hex-h: 56px;
    --half-h: 28px;
    --hex-overlap: -10px;
    --hex-border: 2px;
    --cell-pad: 3px;
    --field-pad: 15px;
    display: flex;
    flex-direction: row;
    gap: 0px;
    background: transparent;
    padding: var(--field-pad);
    border-radius: 4px;
    border: 0;
    box-shadow: none;
    max-width: 100%;
    width: fit-content;
    justify-content: center;
    position: relative;
}

.field-rotation-frame .soccer-field {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    transform-origin: center;
}

.zone-label {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.82);
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
}

.field-rotation-frame .zone-label {
    display: none;
}

.third-label {
    top: 4px;
    transform: translateX(-50%);
}

.lane-label {
    left: 8px;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
}

.third-defensive { left: 17%; }
.third-midfield { left: 50%; }
.third-attacking { left: 83%; }
.lane-left { top: 16%; }
.lane-center { top: 50%; }
.lane-right { top: 84%; }

.hex-column {
    display: flex;
    flex-direction: column;
    gap: 0px;
    margin-left: var(--hex-overlap);
}

.hex-column:first-child {
    margin-left: 0;
}

.hex-column.odd {
    margin-top: 0;
}

.half-cell {
    width: var(--hex-w);
    height: var(--half-h);
    background: #3a6b1f;
    border: var(--hex-border) solid #2d5016;
    position: relative;
    clip-path: polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%);
    --third-tint: rgba(255, 255, 255, 0);
    --lane-tint: rgba(255, 255, 255, 0);
    --zone-seam-x: rgba(255, 255, 255, 0);
}

.half-cell.bottom {
    clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
}

.half-cell::before {
    content: "";
    position: absolute;
    inset: 0;
    clip-path: inherit;
    pointer-events: none;
    background:
        linear-gradient(var(--third-tint), var(--third-tint)),
        linear-gradient(var(--lane-tint), var(--lane-tint));
    box-shadow:
        inset 4px 0 0 var(--zone-seam-x),
        inset -4px 0 0 var(--zone-seam-x);
}

.field-cell {
    background: #3a6b1f;
    border: var(--hex-border) solid #2d5016;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    transition: background 0.2s;
    width: var(--hex-w);
    height: var(--hex-h);
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    position: relative;
    padding: var(--cell-pad);
    overflow: visible;
    --third-tint: rgba(255, 255, 255, 0);
    --lane-tint: rgba(255, 255, 255, 0);
    --zone-seam-x: rgba(255, 255, 255, 0);
}

.field-cell::before {
    content: "";
    position: absolute;
    inset: 0;
    clip-path: inherit;
    pointer-events: none;
    background:
        linear-gradient(var(--third-tint), var(--third-tint)),
        linear-gradient(var(--lane-tint), var(--lane-tint));
    box-shadow:
        inset 4px 0 0 var(--zone-seam-x),
        inset -4px 0 0 var(--zone-seam-x);
    z-index: 0;
}

.field-cell > * {
    position: relative;
    z-index: 1;
    transform: rotate(90deg);
}

.zone-defensive { --third-tint: rgba(40, 140, 45, 0.22); }
.zone-midfield { --third-tint: rgba(190, 175, 35, 0.24); }
.zone-attacking { --third-tint: rgba(40, 125, 170, 0.24); }
.zone-left { --lane-tint: rgba(255, 255, 255, 0.05); }
.zone-center { --lane-tint: rgba(255, 255, 255, 0.00); }
.zone-right { --lane-tint: rgba(0, 0, 0, 0.06); }

.field-cell:hover {
    background: #4a7b2f;
}

/* Cells near goal zones have visual goal indicators */
.field-cell.near-goal-left {
    background: linear-gradient(to right, #1565C0 0%, #1565C0 12%, #3a6b1f 12%, #3a6b1f 100%);
    border-left: 8px solid #2196F3;
    box-shadow:
        inset 8px 0 15px rgba(33, 150, 243, 0.5),
        -3px 0 10px rgba(33, 150, 243, 0.65);
}

.field-cell.near-goal-right {
    background: linear-gradient(to left, #C62828 0%, #C62828 12%, #3a6b1f 8%, #3a6b1f 100%);
    border-right: 8px solid #EF5350;
    box-shadow:
        inset -8px 0 15px rgba(239, 83, 80, 0.5),
        3px 0 10px rgba(239, 83, 80, 0.65);
}

.field-cell.selected {
    background: #43A047;
    box-shadow: 0 0 18px rgba(67, 160, 71, 0.95);
}

.field-cell.valid-move {
    background: #64B5F6;
    cursor: pointer;
}

.field-cell.valid-target {
    background: #FFEB3B;
    color: #1b1b1b;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(255, 235, 59, 0.8);
}

.field-cell.marked-zone {
    box-shadow: inset 0 0 0 4px rgba(255, 235, 59, 0.75);
}

.field-cell.marked-blue {
    box-shadow: inset 0 0 0 4px rgba(33, 150, 243, 0.9), 0 0 12px rgba(33, 150, 243, 0.45);
}

.field-cell.marked-red {
    box-shadow: inset 0 0 0 4px rgba(229, 57, 53, 0.9), 0 0 12px rgba(229, 57, 53, 0.45);
}

.field-cell.marked-blue.marked-red {
    box-shadow: inset 0 0 0 4px rgba(156, 39, 176, 0.95), 0 0 14px rgba(156, 39, 176, 0.55);
}

.mark-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    min-width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.58rem;
    font-weight: 900;
    border: 1px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 1px 5px rgba(0, 0, 0, 0.45);
    z-index: 2;
}

.mark-badge.mark-blue {
    background: #1565C0;
}

.mark-badge.mark-red {
    background: #C62828;
}

.mark-badge.mark-both {
    background: #6A1B9A;
}

.card.defense-side {
    background: linear-gradient(135deg, #607D8B, #90A4AE);
}

.player-token {
    position: relative;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 900;
    border: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
}

.player-token.player-team {
    background: #1565C0;
}

.player-token.ai-team {
    background: #C62828;
}

.player-token.off-balance {
    filter: grayscale(0.35);
    box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.55),
        0 0 0 3px rgba(255, 193, 7, 0.85);
}

.player-token.off-balance::after {
    content: "!";
    position: absolute;
    top: -8px;
    right: -7px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #FFC107;
    color: #1b1b1b;
    font-size: 0.65rem;
    line-height: 14px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.9);
}

.airborne-ball {
    transform: rotate(90deg) translateY(-2px);
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
}

/* Cards */
.hand-container, .market-container {
    background: rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 8px;
    max-width: 100%;
    overflow: hidden;
}

.market-container {
    display: none;
}

.hand-container h2, .market-container h2 {
    margin: 0 0 10px 0;
    font-size: 1rem;
    color: #64B5F6;
    text-align: center;
    letter-spacing: 1px;
}

.hand, .market {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-start;
    min-height: 120px;
    max-width: 100%;
    overflow: hidden;
}

/* Manual control mode hand sections */
.hand-section {
    width: 100%;
    margin-bottom: 12px;
}

.hand-label {
    font-size: 0.95rem;
    margin-bottom: 8px;
    padding: 7px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    text-align: center;
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.hand-label.active-turn {
    background: rgba(76, 175, 80, 0.3);
    border-color: #4CAF50;
    box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
    }
    50% {
        box-shadow: 0 0 25px rgba(76, 175, 80, 0.8);
    }
}

.hand-cards {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-start;
    max-width: 100%;
    overflow: hidden;
}

.card {
    width: 118px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: 3px solid #fff;
    border-radius: 8px;
    padding: 7px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
}

.card.split-card {
    padding: 8px;
}

.card-side {
    border-radius: 7px;
    padding: 7px;
    border: 2px solid rgba(255, 255, 255, 0.55);
    background: rgba(0, 0, 0, 0.22);
    transition: opacity 0.2s, border-color 0.2s, background 0.2s;
}

.card-side + .card-side {
    margin-top: 6px;
}

.card-side.inactive {
    opacity: 0.5;
    padding: 5px 7px;
}

.card-side.active {
    border-color: #ffeb3b;
    background: rgba(0, 0, 0, 0.12);
}

.card-side.inactive .card-type,
.card-side.inactive .card-description {
    display: none;
}

.card-mode {
    font-size: 0.68rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    opacity: 0.85;
    margin-bottom: 4px;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
}

.card.selected {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #ffeb3b;
    border-color: #ffeb3b;
}

.card.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-weight: bold;
}

.card-name {
    font-size: 0.95rem;
}

.card-cost {
    background: #ffd700;
    color: #333;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 0.9rem;
}

.card-type {
    font-size: 0.8rem;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
}

.card-description {
    font-size: 0.85rem;
    line-height: 1.4;
    background: rgba(0, 0, 0, 0.3);
    padding: 8px;
    border-radius: 5px;
    min-height: 60px;
}

.card-stats {
    margin-top: 8px;
    font-size: 0.75rem;
    opacity: 0.9;
}

.command-summary {
    font-size: 0.72rem;
    line-height: 1.35;
    background: rgba(0, 0, 0, 0.28);
    padding: 7px;
    border-radius: 5px;
    margin-bottom: 7px;
}

.command-section {
    border-top: 1px solid rgba(255, 255, 255, 0.28);
    padding-top: 5px;
    margin-top: 5px;
    font-size: 0.66rem;
    line-height: 1.3;
}

.command-section-label {
    display: inline-block;
    min-width: 18px;
    font-weight: 800;
    color: #FFEB3B;
}

.planned-area {
    width: 100%;
}

.planned-row {
    margin-top: 8px;
}

.planned-title {
    font-size: 0.78rem;
    font-weight: 800;
    color: #64B5F6;
    margin-bottom: 6px;
    text-align: center;
    letter-spacing: 0.04em;
}

.planned-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}

.planned-cards .card {
    width: 128px;
    padding: 7px;
    cursor: default;
}

.planned-cards .card.clickable {
    cursor: pointer;
}

.planned-cards .card.current-card {
    border-color: #FFEB3B;
    box-shadow: 0 0 18px rgba(255, 235, 59, 0.75);
}

.planned-cards .card.resolved-card {
    opacity: 0.45;
}

.planned-placeholder {
    width: 128px;
    min-height: 78px;
    border: 2px dashed rgba(255, 255, 255, 0.35);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(0, 0, 0, 0.16);
}

.action-panel {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.28);
    border: 2px solid rgba(255, 235, 59, 0.6);
    border-radius: 8px;
    text-align: center;
}

.action-panel-title {
    font-size: 0.82rem;
    font-weight: 800;
    margin-bottom: 8px;
}

.action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}

.action-choice-btn {
    padding: 7px 10px;
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
    font-size: 0.78rem;
    cursor: pointer;
}

.action-choice-btn:hover,

// ========================================
// GAME STATE & CONSTANTS
// ========================================

const FIELD_WIDTH = 17;
const FIELD_HEIGHT = 13;
const HAND_SIZE = 6;
const MARKET_SIZE = 6;
const ACTIONS_PER_TURN = 3;
const PLAYERS_PER_TEAM = 5;

const CARD_TYPES = {
    COMMAND: 'command',
    MOVEMENT: 'movement',
    PASS: 'pass',
    SHOT: 'shot',
    ECONOMY: 'economy',
    COACH: 'coach',
    // Legacy/deprecated
    DEFEND: 'defend'
};

// Card type color mapping
const CARD_TYPE_COLORS = {
    command: { primary: '#455A64', secondary: '#78909C' },
    movement: { primary: '#4CAF50', secondary: '#81C784' },
    pass: { primary: '#2196F3', secondary: '#64B5F6' },
    shot: { primary: '#F44336', secondary: '#E57373' },
    economy: { primary: '#FFC107', secondary: '#FFD54F' },
    coach: { primary: '#9C27B0', secondary: '#BA68C8' },
    defense: { primary: '#607D8B', secondary: '#90A4AE' }
};

let gameState = {
    field: [],
    playerScore: 0,
    aiScore: 0,
    currentTurn: 'player',
    actionsRemaining: ACTIONS_PER_TURN,
    coins: 0,
   
    playerDeck: [],
    playerHand: [],
    playerDiscard: [],
    playerCoach: null, // Active coach card for player
    playerCoachUsed: false, // Whether coach ability used this turn
   
    aiDeck: [],
    aiHand: [],
    aiDiscard: [],
    aiCoach: null, // Active coach card for AI
    aiCoachUsed: false, // Whether coach ability used this turn
   
    market: [],
    marketDeck: [], // Draw deck for market cards
    selectedCard: null,
    selectedPlayer: null,
    selectedMarkCells: [],
    moveHistory: [],
    undoHistory: [],
    gameLog: ['Game started! Draw your cards and make your move!'],
    multiMove: null,
    commandActivation: null,
    plannedOffense: [],
    plannedDefense: [],
    offenseTeam: 'player',
    defenseTeam: 'ai',
    offenseResolveIndex: 0,
    resolvingRole: null,
    resolvingPlannedCard: false,
    resolutionStep: 0,
    comboPassPending: null, // Stores pending pass info for combo cards like Playmaker
    pendingMoveMark: null,
    defensiveMarks: [],
    offBalancePlayers: [],
    airborneBall: null,
    loosePossessionTeam: null,
    pendingRebound: null,
    kickoffPending: false,
    goalKickPending: false,
    gamePhase: 'action', // 'action', 'reposition_shooter', 'reposition_defender', 'defensive_reaction', 'goal_kick_selection'
    aiDebugMode: true, // DEBUG: Set to false to make AI auto-play
    manualControlMode: false, // When true, player controls both teams
    fieldViewTeam: 'player', // Visual-only field orientation: 'player' or 'ai'
    aiActionQueue: [], // Queue of AI actions to execute step-by-step
    aiPhase: 'idle', // 'idle', 'playing_economy', 'playing_actions', 'buying', 'done'
    repositionTeam: null,
    repositionRange: 0,
    repositionsRemaining: [],
    pendingPass: null, // Stores pass info during defensive reaction
    goalKickDefenders: null, // Defenders tied for closest during goal kick
    goalKickCell: null,
    goalKickShootingTeam: null,
    goalKickDefendingTeam: null
};

// ========================================
// HELPER FUNCTIONS
// ========================================

function getCell(x, y) {
    return gameState.field.find(cell => cell.x === x && cell.y === y);
}

function getCellWithPlayer(team, playerId) {
    return gameState.field.find(cell =>
        cell.player && cell.player.team === team && cell.player.id === playerId
    );
}

function getCellWithBall() {
    return gameState.field.find(cell => cell.ball);
}

function isAirborneBallCell(cell) {
    return !!(gameState.airborneBall && cell &&
        gameState.airborneBall.x === cell.x &&
        gameState.airborneBall.y === cell.y);
}

function getAirborneBallCell() {
    if (!gameState.airborneBall) return null;
    return getCell(gameState.airborneBall.x, gameState.airborneBall.y);
}

function canHeaderFromCell(actorCell) {
    const airborneCell = getAirborneBallCell();
    return !!(actorCell?.player &&
        airborneCell &&
        canUseStillnessAction(actorCell) &&
        distance(actorCell.x, actorCell.y, airborneCell.x, airborneCell.y) <= 1);
}

function clearAirborneBall() {
    gameState.airborneBall = null;
}

function setControlledPossession(team) {
    gameState.loosePossessionTeam = null;
    gameState.pendingRebound = null;
    if (team) {
        gameState.currentTurn = team;
    }
}

function setLoosePossession(team) {
    gameState.loosePossessionTeam = team || gameState.offenseTeam || gameState.currentTurn;
}

function distance(x1, y1, x2, y2) {
    // Hexagonal distance calculation for flat-top hexes (odd-q offset)
    // Convert to axial coordinates for proper hex distance
    const q1 = x1;
    const r1 = y1 - (x1 - (x1 & 1)) / 2;
    const q2 = x2;
    const r2 = y2 - (x2 - (x2 & 1)) / 2;
   
    return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
}

function getColumnHeight(x) {
    return x % 2 === 0 ? FIELD_HEIGHT : FIELD_HEIGHT - 1;
}

function getPitchZones(cell, perspectiveTeam = 'player') {
    let third = cell.x <= 5 ? 'defensive' : cell.x <= 10 ? 'midfield' : 'attacking';
    if (perspectiveTeam === 'ai') {
        if (third === 'defensive') third = 'attacking';
        else if (third === 'attacking') third = 'defensive';
    }
    const shortColumn = cell.x % 2 === 1;
    let lane = cell.y <= 3 ? 'left' : cell.y <= 8 ? 'center' : 'right';
    let laneLabel = lane;
    let lanes = [lane];

    if (shortColumn && cell.y === 3) {
        lane = 'left';
        laneLabel = 'left/center';
        lanes = ['left', 'center'];
    } else if (shortColumn && cell.y === 8) {
        lane = 'center';
        laneLabel = 'center/right';
        lanes = ['center', 'right'];
    }

    if (perspectiveTeam === 'ai') {
        const flipLane = laneName => {
            if (laneName === 'left') return 'right';
            if (laneName === 'right') return 'left';
            return laneName;
        };
        lane = flipLane(lane);
        lanes = lanes.map(flipLane);
        laneLabel = lanes.join('/');
    }

    return {
        third,
        lane,
        lanes,
        laneLabel
    };
}

function teamHasBall(team) {
    const ballCell = getCellWithBall();
    if (isAirborneBallCell(ballCell)) return false;
    return !!(ballCell && ballCell.player && ballCell.player.team === team);
}

function getActiveCardEffect(card, team = gameState.currentTurn) {
    if (card.defenseEffect && !teamHasBall(team)) {
        return card.defenseEffect;
    }
    return card.effect;
}

function getCardDisplay(card, team = null) {
    const isDefense = team && card.defenseEffect && !teamHasBall(team);
    if (!isDefense) {
        return {
            name: card.name,
            type: card.type,
            description: card.description,
            isDefense: false
        };
    }

    return {
        name: card.defenseEffect.name,
        type: 'defense',
        description: card.defenseEffect.description,
        isDefense: true
    };
}

function getCardSideState(card, team = null) {
    if (!team || !card.defenseEffect) {
        return 'offense';
    }
    return teamHasBall(team) ? 'offense' : 'defense';
}

function clearDefensiveMarksForTeam(team) {
    gameState.defensiveMarks = gameState.defensiveMarks.filter(mark => mark.team !== team);
}

function expireDefensiveMarks() {
    gameState.defensiveMarks = gameState.defensiveMarks.filter(mark =>
        gameState.resolutionStep <= (mark.createdStep || 0) + 2
    );
}

function clearMarksForActivatedPlayer(team, playerId) {
    gameState.defensiveMarks = gameState.defensiveMarks.filter(mark =>
        !(mark.team === team && mark.defender.id === playerId && gameState.resolutionStep > (mark.createdStep || 0))
    );
}

function generateId() {
    return Math.random().toString(36).substr(2, 9);
}

function shuffleDeck(deck) {
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }
}

function drawCards(team, count) {
    const deck = team === 'player' ? gameState.playerDeck : gameState.aiDeck;
    const hand = team === 'player' ? gameState.playerHand : gameState.aiHand;
    const discard = team === 'player' ? gameState.playerDiscard : gameState.aiDiscard;
   
    for (let i = 0; i < count; i++) {
        if (deck.length === 0) {
            deck.push(...discard);
            discard.length = 0;
            shuffleDeck(deck);
        }
       
        if (deck.length > 0) {
            hand.push(deck.pop());
        }
    }
}

// Convert offset coordinates to axial for hex math
function offsetToAxial(x, y) {
    const q = x;
    const r = y - (x - (x & 1)) / 2;
    return { q, r };
}

function axialToOffset(q, r) {
    const x = q;
    const y = r + (q - (q & 1)) / 2;
    return { x, y };
}

// Get all hexes along line from start to end
function getHexLine(x1, y1, x2, y2) {
    const start = offsetToAxial(x1, y1);
    const end = offsetToAxial(x2, y2);
   
    const dist = Math.max(
        Math.abs(start.q - end.q),
        Math.abs(start.r - end.r),
        Math.abs(start.q + start.r - end.q - end.r)
    );
   
    const hexes = [];
   
    for (let i = 0; i <= dist; i++) {
        const t = dist === 0 ? 0 : i / dist;
        const q = Math.round(start.q + (end.q - start.q) * t);
        const r = Math.round(start.r + (end.r - start.r) * t);
        const offset = axialToOffset(q, r);
       
        // Skip start and end hexes
        if (i > 0 && i < dist) {
            const cell = getCell(offset.x, offset.y);
            if (cell) {
                hexes.push(cell);
            }
        }
    }
   
    return hexes;
}

function getAdjacentCells(x, y) {
    // Hexagonal grid adjacency (odd-q offset coordinates for flat-top hexes)
    const cells = [];
    const isOddCol = x % 2 === 1;
   
    // All columns have these 4 directions
    if (x > 0) cells.push(getCell(x - 1, y)); // W
    if (x < FIELD_WIDTH - 1) cells.push(getCell(x + 1, y)); // E
    if (y > 0) cells.push(getCell(x, y - 1)); // N
    if (y < FIELD_HEIGHT - 1) cells.push(getCell(x, y + 1)); // S
   
    // Diagonal neighbors depend on odd/even column
    if (isOddCol) {
        // Odd columns: SW and SE are offset down
        if (x > 0 && y < FIELD_HEIGHT - 1) cells.push(getCell(x - 1, y + 1)); // SW
        if (x < FIELD_WIDTH - 1 && y < FIELD_HEIGHT - 1) cells.push(getCell(x + 1, y + 1)); // SE
    } else {
        // Even columns: NW and NE are offset up
        if (x > 0 && y > 0) cells.push(getCell(x - 1, y - 1)); // NW
        if (x < FIELD_WIDTH - 1 && y > 0) cells.push(getCell(x + 1, y - 1)); // NE
    }
   
    return cells.filter(c => c);
}

function getMarkedThreat(cell, defendingTeam) {
    for (const mark of gameState.defensiveMarks) {
        if (mark.team !== defendingTeam) continue;

        const defenderCell = mark.defender.id
            ? getCellWithPlayer(defendingTeam, mark.defender.id)
            : getCell(mark.defender.x, mark.defender.y);
        if (!defenderCell || !defenderCell.player || defenderCell.player.team !== defendingTeam) continue;

        const coversCell = mark.zones.some(zone => zone.x === cell.x && zone.y === cell.y);
        if (coversCell) {
            return {
                defenderCell,
                threatCell: cell,
                marked: true
            };
        }
    }

    return null;
}

function getDefensiveThreat(cell, defendingTeam) {
    if (cell.player && cell.player.team === defendingTeam) {
        return {
            defenderCell: cell,
            threatCell: cell,
            marked: false
        };
    }

    return getMarkedThreat(cell, defendingTeam);
}

function isMarkedByTeam(cell, markingTeam) {
    return !!getMarkedThreat(cell, markingTeam);
}

function getMarkTeamsForCell(cell) {
    const teams = new Set();
    gameState.defensiveMarks.forEach(mark => {
        if (mark.zones.some(zone => zone.x === cell.x && zone.y === cell.y)) {
            teams.add(mark.team);
        }
    });
    return [...teams];
}

function getPlayerStateKey(team, playerId) {
    return `${team}:${playerId}`;
}

function isPlayerOffBalance(team, playerId) {
    const key = getPlayerStateKey(team, playerId);
    return gameState.offBalancePlayers.some(entry =>
        typeof entry === 'string' ? entry === key : entry.key === key
    );
}

function setPlayerOffBalance(team, playerId) {
    const key = getPlayerStateKey(team, playerId);
    if (!isPlayerOffBalance(team, playerId)) {
        gameState.offBalancePlayers.push({
            key,
            team,
            playerId,
            createdStep: gameState.resolutionStep
        });
    }
}

function clearPlayerOffBalance(team, playerId) {
    const key = getPlayerStateKey(team, playerId);
    gameState.offBalancePlayers = gameState.offBalancePlayers.filter(entry =>
        typeof entry === 'string' ? entry !== key : entry.key !== key
    );
}

function clearExpiredOffBalanceForTeam(team) {
    gameState.offBalancePlayers = gameState.offBalancePlayers.filter(entry => {
        const entryTeam = typeof entry === 'string' ? entry.split(':')[0] : entry.team;
        const createdStep = typeof entry === 'string' ? -1 : entry.createdStep;
        return !(entryTeam === team && createdStep < gameState.resolutionStep);
    });
}

function getMovementCostDistance(fromCell, toCell, movingTeam) {
    const markingTeam = movingTeam === 'player' ? 'ai' : 'player';
    const startKey = `${fromCell.x},${fromCell.y}`;
    const targetKey = `${toCell.x},${toCell.y}`;
    const costs = new Map([[startKey, 0]]);
    const queue = [fromCell];

    while (queue.length > 0) {
        queue.sort((a, b) => costs.get(`${a.x},${a.y}`) - costs.get(`${b.x},${b.y}`));
        const current = queue.shift();
        const currentKey = `${current.x},${current.y}`;
        const currentCost = costs.get(currentKey);
        if (currentKey === targetKey) return currentCost;

        getAdjacentCells(current.x, current.y).forEach(next => {
            if (next.player && next !== toCell) return;
            const stepCost = isMarkedByTeam(current, markingTeam) ? 2 : 1;
            const nextCost = currentCost + stepCost;
            const nextKey = `${next.x},${next.y}`;
            if (!costs.has(nextKey) || nextCost < costs.get(nextKey)) {
                costs.set(nextKey, nextCost);
                queue.push(next);
            }
        });
    }

    return Infinity;
}

function finishCommandActivationState(team) {
    clearExpiredOffBalanceForTeam(team);
    if (gameState.airborneBall &&
        gameState.airborneBall.crossingTeam === team &&
        gameState.airborneBall.createdStep < gameState.resolutionStep) {
        log(`Airborne ball lands at (${gameState.airborneBall.x}, ${gameState.airborneBall.y}) and is uncontrolled.`);
        clearAirborneBall();
    }
}

function completeCardPlay(card, team) {
    finishCommandActivationState(team);

    if (gameState.resolvingPlannedCard) {
        advanceResolutionAfterCard(card, team);
        return;
    }

    if (!card.isFreeAction) {
        gameState.actionsRemaining--;
        discardCard(card, team);
    }

    gameState.selectedCard = null;
    gameState.selectedPlayer = null;
    gameState.selectedMarkCells = [];
    clearMoveHistory();
    gameState.multiMove = null;
    gameState.commandActivation = null;
    gameState.plannedOffense = [];
    gameState.plannedDefense = [];
    gameState.offenseResolveIndex = 0;
    gameState.resolvingRole = null;
    gameState.resolvingPlannedCard = false;
    gameState.pendingMoveMark = null;
    render();
}

function finishMovementCard() {
    if (gameState.selectedCard && gameState.commandActivation) {
        if (gameState.commandActivation.selectedPlayers.length === 0) {
            log(`${gameState.selectedCard.name}: no eligible activation. Card fizzles.`);
            completeCardPlay(gameState.selectedCard, gameState.currentTurn);
            return;
        }
        if (gameState.commandActivation.phase === 'select') {
            startCommandMovement();
        } else {
            completeCommandCard();
        }
        return;
    }

    if (!gameState.selectedCard || !gameState.multiMove || gameState.multiMove.movedPlayerIds.length === 0) {
        return;
    }

    const card = gameState.selectedCard;
    const team = gameState.currentTurn;
    log(`Finished movement with ${gameState.multiMove.movedPlayerIds.length} player move${gameState.multiMove.movedPlayerIds.length === 1 ? '' : 's'}.`);
    completeCardPlay(card, team);
}

function createKickoffPassCard() {
    return {
        id: 'kickoff_pass',
        name: 'Kickoff Pass',
        type: CARD_TYPES.PASS,
        cost: 0,
        description: 'Free medium pass to start play',
        effect: { type: 'pass', range: 4 },
        isFreeAction: true,
        isKickoff: true,
        uid: 'kickoff-pass'
    };
}

function createGoalKickCard() {

        type: CARD_TYPES.PASS,

}

function createGoalKickClearCard() {

}

function startKickoffPass(team) {
