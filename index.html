    gameState.kickoffPending = true;
    gameState.goalKickPending = false;
    gameState.selectedCard = createKickoffPassCard();
    gameState.selectedPlayer = null;
    gameState.selectedMarkCells = [];
    gameState.multiMove = null;
    gameState.commandActivation = null;
    gameState.pendingMoveMark = null;
    log(`${team === 'player' ? 'Your' : 'AI'} kickoff: make a free medium pass.`);
}

function startGoalKickPass(team) {
    gameState.currentTurn = team;
    gameState.kickoffPending = false;
    gameState.goalKickPending = true;
    gameState.selectedCard = createGoalKickCard();
    gameState.selectedPlayer = null;
    gameState.selectedMarkCells = [];
    gameState.multiMove = null;
    gameState.commandActivation = null;
    gameState.pendingMoveMark = null;
    log(`${team === 'player' ? 'Your' : 'AI'} goal kick: make a free long pass to a teammate.`);
}

function startGoalKickClear(team, shotGoalCell = null) {
    const activeCard = gameState.selectedCard;
    const activeTeam = gameState.currentTurn;
    if (activeCard && !activeCard.isGoalKick) {
        discardCardOnce(activeCard, activeTeam);
    }
    discardUnresolvedPlannedCards();
    resetResolutionState();
    drawCards('player', Math.max(0, HAND_SIZE - gameState.playerHand.length));
    drawCards('ai', Math.max(0, HAND_SIZE - gameState.aiHand.length));

    gameState.currentTurn = team;
    gameState.loosePossessionTeam = null;
    gameState.kickoffPending = false;
    gameState.goalKickPending = true;
    gameState.selectedCard = createGoalKickClearCard();
    gameState.selectedMarkCells = [];
    gameState.multiMove = null;
    gameState.commandActivation = null;
    gameState.pendingMoveMark = null;
    clearAirborneBall();

    gameState.field.forEach(cell => {
        cell.ball = false;
    });

    const goalX = shotGoalCell ? shotGoalCell.x : (team === 'player' ? 0 : 16);
    const goalY = shotGoalCell?.y === 6 ? (Math.random() < 0.5 ? 5 : 7) : (shotGoalCell?.y || 5);
    const clearCell = getCell(goalX, goalY) || getCell(goalX, 5);
    gameState.selectedPlayer = clearCell;
    if (clearCell) {
        clearCell.ball = true;
    }

    log(`${team === 'player' ? 'Blue' : 'Red'} goal kick: choose a CLEAR target from (${clearCell?.x}, ${clearCell?.y}).`);
    render();
}

function aiTakeKickoffPass() {
    const ballCell = getCellWithBall();
    if (!ballCell) return false;

    const targets = gameState.field
        .filter(cell => cell.player && cell.player.team === 'ai' && cell !== ballCell)
        .filter(cell => distance(ballCell.x, ballCell.y, cell.x, cell.y) <= 4)
        .sort((a, b) => a.x - b.x);

    if (targets.length === 0) {
        return false;
    }

    const target = targets[0];
    log(`AI kickoff pass to (${target.x}, ${target.y})`);
    passBall(target);
    gameState.kickoffPending = false;
    gameState.selectedCard = null;
    startPlanningRound();
    return true;
}

function aiTakeGoalKickPass() {
    const ballCell = getCellWithBall();
    if (!ballCell) return false;

    const targets = gameState.field
        .filter(cell => cell.player && cell.player.team === 'ai' && cell !== ballCell)
        .filter(cell => distance(ballCell.x, ballCell.y, cell.x, cell.y) <= 6)
        .sort((a, b) => a.x - b.x);

    if (targets.length === 0) {
        return false;
    }

    const target = targets[0];
    log(`AI goal kick to (${target.x}, ${target.y})`);
    passBall(target);
    gameState.goalKickPending = false;
    gameState.selectedCard = null;
    startPlanningRound();
    return true;
}

function applyDefensiveMark(card, defenderCell, zones) {
    const team = gameState.currentTurn;
    const effect = getActiveCardEffect(card, team);

    gameState.defensiveMarks = gameState.defensiveMarks.filter(mark =>
        !(mark.team === team && mark.defender.x === defenderCell.x && mark.defender.y === defenderCell.y)
    );

    gameState.defensiveMarks.push({
        team,
        defender: { id: defenderCell.player.id, x: defenderCell.x, y: defenderCell.y },
        zones: zones.map(zone => ({ x: zone.x, y: zone.y })),
        source: effect.name,
        createdStep: gameState.resolutionStep
    });

    log(`${effect.name}: defender at (${defenderCell.x}, ${defenderCell.y}) now covers ${zones.length} adjacent hex${zones.length === 1 ? '' : 'es'}.`);
    completeCardPlay(card, team);
}

function getCommandCellLanes(cell, perspectiveTeam = gameState.currentTurn) {
    return getPitchZones(cell, perspectiveTeam).lanes;
}

function getSelectedCommandPlayer(cell) {
    const commandState = gameState.commandActivation;
    if (!commandState || !cell.player || cell.player.team !== gameState.currentTurn) return null;
    return commandState.selectedPlayers.find(selected => selected.playerId === cell.player.id) || null;
}

function getCommandMaxSelections(command) {
    if (command.supportMove) return command.count + command.supportMove.count;
    if (command.mode === 'lane') return command.count;
    return command.lanes.length * command.perLane;
}

function getCommandSelectionLane(cell, command) {
    const cellLanes = getCommandCellLanes(cell);
    return command.lanes.find(lane => cellLanes.includes(lane)) || null;
}

function getCommandSupportSelectionLane(cell, command) {
    if (!command.supportMove) return null;
    const cellLanes = getCommandCellLanes(cell);
    return command.supportMove.lanes.find(lane => cellLanes.includes(lane)) || null;
}

function getCommandSelectedLaneCounts(commandState) {
    return commandState.selectedPlayers.reduce((counts, selected) => {
        counts[selected.lane] = (counts[selected.lane] || 0) + 1;
        return counts;
    }, {});
}

function isSelectedForCommand(cell) {
    return !!getSelectedCommandPlayer(cell);
}

function canSelectForCommand(cell, card) {
    if (!cell.player || cell.player.team !== gameState.currentTurn) return false;
    if (isSelectedForCommand(cell)) return false;

    const command = card.command;
    const zones = getPitchZones(cell, gameState.currentTurn);
    if (command.mode === 'third' && zones.third !== command.third) return false;

    const selectedCount = gameState.commandActivation.selectedPlayers.length;
    if (selectedCount >= getCommandMaxSelections(command)) return false;

    const lane = getCommandSelectionLane(cell, command);
    const supportLane = getCommandSupportSelectionLane(cell, command);
    if (!lane && !supportLane) return false;

    if (command.supportMove && command.mode === 'lane') {
        const mainSelected = gameState.commandActivation.selectedPlayers.filter(selected => !selected.supportOnly).length;
        const supportSelected = gameState.commandActivation.selectedPlayers.filter(selected => selected.supportOnly).length;
        if (lane && mainSelected < command.count) return true;
        if (supportLane && supportSelected < command.supportMove.count) return true;
        return false;
    }

    if (command.mode !== 'lane') {
        const laneCounts = getCommandSelectedLaneCounts(gameState.commandActivation);
        if ((laneCounts[lane] || 0) >= command.perLane) return false;
    }

    return true;
}

function selectCommandPlayer(cell, card) {
    recordUndoSnapshot(`activating player at (${cell.x}, ${cell.y})`);
    const command = card.command;
    const mainLane = getCommandSelectionLane(cell, command);
    const supportLane = getCommandSupportSelectionLane(cell, command);
    const mainSelected = gameState.commandActivation.selectedPlayers.filter(selected => !selected.supportOnly).length;
    const supportOnly = !!(command.supportMove && (!mainLane || mainSelected >= command.count));
    const lane = supportOnly ? supportLane : mainLane;
    const wasOffBalance = isPlayerOffBalance(gameState.currentTurn, cell.player.id);
    clearMarksForActivatedPlayer(gameState.currentTurn, cell.player.id);
    gameState.commandActivation.selectedPlayers.push({
        playerId: cell.player.id,
        lane,
        start: { x: cell.x, y: cell.y },
        wasOffBalance,
        supportOnly
    });

    const selected = gameState.commandActivation.selectedPlayers.length;
    const max = getCommandMaxSelections(command);
    log(`${card.name}: activated ${selected}/${max} player${selected === 1 ? '' : 's'}${supportOnly ? ' (support move only)' : ''}${wasOffBalance ? ' (off balance: movement only)' : ''}.`);

    if (selected >= max) {
        startCommandMovement();
    } else {
        render();
    }
}

function startCommandMovement() {
    if (!gameState.commandActivation || gameState.commandActivation.selectedPlayers.length === 0) return;
    gameState.commandActivation.phase = 'move';
    gameState.selectedPlayer = null;
    log('Command movement: move activated players up to 4 spaces. Ball carriers move up to 2.');
    render();
}

function completeCommandCard() {
    const card = gameState.selectedCard;
    if (!card || !gameState.commandActivation) return;

    if (gameState.commandActivation.actionSpent) {
        log(`${card.name}: ${gameState.commandActivation.actionSpentReason || 'action already spent'}.`);
        completeCardPlay(card, gameState.currentTurn);
        return;
    }

    if (gameState.commandActivation.phase !== 'act') {
        if (gameState.commandActivation.phase === 'move') {
            gameState.commandActivation.phase = 'free_pass';
            gameState.selectedPlayer = getCommandFreePasser();
            log(`${card.name}: movement complete. Make one optional standard pass, or skip to actions.`);
            render();
            return;
        }
        if (gameState.commandActivation.phase === 'free_pass') {
            gameState.commandActivation.phase = 'act';
            gameState.selectedPlayer = null;
            log(`${card.name}: choose one activated player to take an action.`);
            render();
            return;
        }
        gameState.commandActivation.phase = 'act';
        gameState.selectedPlayer = null;
        log(`${card.name}: movement complete. Choose one activated player to take an action.`);
        render();
        return;
    }

    log(`${card.name}: resolved without an action.`);
    completeCardPlay(card, gameState.currentTurn);
}

function canMoveCommandPlayer(cell) {
    const commandState = gameState.commandActivation;
    if (!commandState || commandState.phase !== 'move') return false;
    if (!cell.player || cell.player.team !== gameState.currentTurn) return false;
    if (commandState.movedPlayerIds.includes(cell.player.id)) return false;
    return !!getSelectedCommandPlayer(cell);
}

function getCommandMoveRangeForCell(cell, baseRange) {
    return cell && cell.ball ? Math.min(2, baseRange) : baseRange;
}

function getCommandMovedDistance(playerId) {
    return gameState.commandActivation?.movedPlayerDistances?.[playerId] || 0;
}

function canUseStillnessAction(cell) {
    if (!cell?.player) return false;
    return getCommandMovedDistance(cell.player.id) <= 1;
}

function getCommandFreePasser() {
    if (!gameState.commandActivation || gameState.commandActivation.freePassUsed) return null;
    const ballCell = getCellWithBall();
    if (!ballCell || isAirborneBallCell(ballCell) || !ballCell.player || ballCell.player.team !== gameState.currentTurn) return null;
    return ballCell;
}

function getLaneIndex(lane) {
    return ['left', 'center', 'right'].indexOf(lane);
}

function getThirdIndex(third) {
    return ['defensive', 'midfield', 'attacking'].indexOf(third);
}

function isStandardPassTarget(passerCell, targetCell, team = gameState.currentTurn) {
    if (!passerCell?.player || !passerCell.ball) return false;
    if (!targetCell?.player || targetCell.player.team !== team || targetCell === passerCell) return false;
    if (isAirborneBallCell(passerCell)) return false;
    const passerZones = getPitchZones(passerCell, team);
    const targetZones = getPitchZones(targetCell, team);
    return passerZones.lanes.some(passerLane =>
        targetZones.lanes.some(targetLane => {
            const laneDistance = Math.abs(getLaneIndex(passerLane) - getLaneIndex(targetLane));
            const thirdDistance = Math.abs(getThirdIndex(passerZones.third) - getThirdIndex(targetZones.third));
            return laneDistance + thirdDistance <= 1;
        })
    );
}

function isValidFreePassTarget(targetCell) {
    const passerCell = getCommandFreePasser();
    if (!passerCell) return false;
    return isStandardPassTarget(passerCell, targetCell, gameState.currentTurn) &&
        isOnsidePassTarget(targetCell, gameState.currentTurn);
}

function getCommandActionsForCell(card, cell) {
    const selected = getSelectedCommandPlayer(cell);
    if (!selected) return [];
    if (selected.supportOnly) return [];
    if (selected.wasOffBalance) return [];
    const third = getPitchZones(cell, gameState.currentTurn).third;
    let actions = card.command.actions[third] || [];
    if (!canUseStillnessAction(cell)) {
        actions = actions.filter(action => !['shoot', 'header'].includes(action));
    }
    if (!canHeaderFromCell(cell)) {
        actions = actions.filter(action => action !== 'header');
    }
    return actions;
}

function chooseCommandActionPlayer(cell) {
    recordUndoSnapshot(`choosing action player at (${cell.x}, ${cell.y})`);
    const card = gameState.selectedCard;
    const actions = getCommandActionsForCell(card, cell);
    if (actions.length === 0) {
        log(`${card.name}: no action options for that player in this third.`);
        return;
    }

    gameState.selectedPlayer = cell;
    gameState.commandActivation.action = null;
    gameState.commandActivation.actingPlayerId = cell.player.id;
    gameState.selectedMarkCells = [];
    log(`${card.name}: choose an action for the selected player.`);
    render();
}

function chooseCommandAction(action) {
    if (!gameState.selectedCard || !gameState.commandActivation || !gameState.selectedPlayer) return;
    recordUndoSnapshot(`choosing ${action}`);
    if (action === 'header') {
        const airborneCell = getAirborneBallCell();
        if (!airborneCell || !canHeaderFromCell(gameState.selectedPlayer)) {
            log(`${gameState.selectedCard.name}: no adjacent airborne ball for that header.`);
            render();
            return;
        }
        gameState.commandActivation.action = action;
        const headerResult = executeHeader(gameState.selectedPlayer, airborneCell);
        if (headerResult === true || headerResult === 'pending' || gameState.goalKickPending || gameState.kickoffPending) return;
        completeCardPlay(gameState.selectedCard, gameState.currentTurn);
        return;
    }
    gameState.commandActivation.action = action;
    gameState.selectedMarkCells = [];
    log(`${gameState.selectedCard.name}: ${action} selected. Choose a target.`);
    render();
}

function executeCommandFreePass(targetCell) {
    const passerCell = getCommandFreePasser();
    if (!passerCell || !isValidFreePassTarget(targetCell)) return;
    recordUndoSnapshot(`free pass to (${targetCell.x}, ${targetCell.y})`);
    const result = executeZonePass(passerCell, targetCell);
    gameState.commandActivation.freePassUsed = true;
    if (result?.forfeitAction) {
        log(`${gameState.selectedCard.name}: failed pass ends the card action.`);
        completeCardPlay(gameState.selectedCard, gameState.currentTurn);
        return;
    }
    gameState.commandActivation.phase = 'act';
    gameState.selectedPlayer = null;
    log(`${gameState.selectedCard.name}: free pass resolved. Choose one activated player to take an action.`);
    render();
}

function getPassTargetLanes(action, passerCell) {
    const zones = getPitchZones(passerCell, gameState.currentTurn);
    if (action === 'pass lane') return zones.lanes;
    if (action === 'pass inside') return ['center'];
    if (action === 'pass outside') return ['left', 'right'];
    if (action === 'cross') return ['center'];
    return [];
}

function getPassTargetThirds(action, passerCell) {
    const third = getPitchZones(passerCell, gameState.currentTurn).third;
    if (action === 'pass lane') return getSameOrAdjacentThirds(third);
    return [third];
}

function getSameOrAdjacentThirds(third) {
    if (third === 'defensive') return ['defensive', 'midfield'];
    if (third === 'midfield') return ['defensive', 'midfield', 'attacking'];
    return ['midfield', 'attacking'];
}

function getShotRequiredRollModifier(card, shooterCell) {
    if (!shooterCell) return 0;
    const zones = getPitchZones(shooterCell, gameState.currentTurn);
    return zones.lanes.includes('center') ? 0 : 1;
}

function getClearPressureCells(cell, team) {
    const origin = offsetToAxial(cell.x, cell.y);
    const clearDirection = team === 'player'
        ? [{ q: origin.q + 1, r: origin.r }, { q: origin.q + 1, r: origin.r - 1 }]
        : [{ q: origin.q - 1, r: origin.r }, { q: origin.q - 1, r: origin.r + 1 }];

    return clearDirection
        .map(hex => axialToOffset(hex.q, hex.r))
        .map(offset => getCell(offset.x, offset.y))
        .filter(Boolean);
}

function isClearPressured(cell, team) {
    const opposingTeam = team === 'player' ? 'ai' : 'player';
    return getClearPressureCells(cell, team).some(pressureCell =>
        pressureCell.player && pressureCell.player.team === opposingTeam
    );
}

function isInClearFan(actorCell, targetCell, team) {
    const origin = offsetToAxial(actorCell.x, actorCell.y);
    const target = offsetToAxial(targetCell.x, targetCell.y);
    const dq = target.q - origin.q;
    const dr = target.r - origin.r;
    const forward = team === 'player' ? dq : -dq;
    if (forward < 3 || forward > 5) return false;

    // A compact forward cone: narrow at range 3, wider at ranges 4-5.
    // This keeps CLEAR directional without letting it become a full-field punt.
    const lateral = dr;
    const maxLateral = forward === 3 ? 1 : 2;
    return Math.abs(lateral) <= maxLateral;
}

function hasAdjacentLineBlockingOpponent(actorCell, targetCell, team) {
    const opposingTeam = team === 'player' ? 'ai' : 'player';
    const lineCells = getHexLine(actorCell.x, actorCell.y, targetCell.x, targetCell.y);
    return getAdjacentCells(actorCell.x, actorCell.y).some(adjacent =>
        adjacent.player &&
        adjacent.player.team === opposingTeam &&
        lineCells.some(lineCell => lineCell.x === adjacent.x && lineCell.y === adjacent.y)
    );
}

function hasActingPlayerMoved(actorCell) {
    const commandState = gameState.commandActivation;
    return !!(commandState && actorCell?.player && commandState.movedPlayerIds.includes(actorCell.player.id));
}

function isOnsidePassTarget(targetCell, team) {
    const defendingTeam = team === 'player' ? 'ai' : 'player';
    const defenders = gameState.field.filter(cell => cell.player && cell.player.team === defendingTeam);
    if (defenders.length === 0) return true;

    if (team === 'player') {
        const lastDefenderX = Math.max(...defenders.map(cell => cell.x));
        return targetCell.x <= lastDefenderX + 1;
    }

    const lastDefenderX = Math.min(...defenders.map(cell => cell.x));
    return targetCell.x >= lastDefenderX - 1;
}

function isValidCommandActionTarget(action, actorCell, targetCell) {
    const team = gameState.currentTurn;
    const opposingTeam = team === 'player' ? 'ai' : 'player';

    if (action.startsWith('mark')) {
        return getAdjacentCells(actorCell.x, actorCell.y).some(cell => cell.x === targetCell.x && cell.y === targetCell.y);
    }
    if (action === 'tackle') {
        return targetCell.ball && targetCell.player && targetCell.player.team === opposingTeam && distance(actorCell.x, actorCell.y, targetCell.x, targetCell.y) <= 1;
    }
    if (['pass lane', 'pass inside', 'pass outside'].includes(action)) {
        if (!actorCell.ball) return false;
        if (isAirborneBallCell(actorCell)) return false;
        if (!targetCell.player || targetCell.player.team !== team || targetCell === actorCell) return false;
        const targetZones = getPitchZones(targetCell, team);
        const allowedLanes = getPassTargetLanes(action, actorCell);
        const allowedThirds = getPassTargetThirds(action, actorCell);
        return allowedLanes.some(lane => targetZones.lanes.includes(lane)) &&
            allowedThirds.includes(targetZones.third) &&
            isOnsidePassTarget(targetCell, team);
    }
    if (action === 'cross') {
        if (!actorCell.ball || isAirborneBallCell(actorCell)) return false;
        if (targetCell.player || targetCell.ball) return false;
        const actorZones = getPitchZones(actorCell, team);
        if (!actorZones.lanes.some(lane => lane === 'left' || lane === 'right')) return false;
        const targetZones = getPitchZones(targetCell, team);
        if (!targetZones.lanes.includes('center')) return false;
        if (targetZones.third !== actorZones.third) return false;
        return !hasAdjacentLineBlockingOpponent(actorCell, targetCell, team);
    }
    if (action === 'dribble') {
        if (!actorCell.ball) return false;
        if (isAirborneBallCell(actorCell)) return false;
        if (targetCell.player) return false;
        if (distance(actorCell.x, actorCell.y, targetCell.x, targetCell.y) > 1) return false;
        return isMarkedByTeam(targetCell, opposingTeam);
    }
    if (action === 'clear') {
        if (!actorCell.ball) return false;
        if (isAirborneBallCell(actorCell)) return false;
        if (isClearPressured(actorCell, team)) return false;
        return isInClearFan(actorCell, targetCell, team);
    }
    if (action === 'header') {
        return canHeaderFromCell(actorCell) && isAirborneBallCell(targetCell);
    }
    if (action === 'shoot') {
        if (!actorCell.ball) return false;
        if (!canUseStillnessAction(actorCell)) return false;
        if (isAirborneBallCell(actorCell)) return false;
        const goalX = team === 'player' ? 16 : 0;
        return targetCell.x === goalX && targetCell.y >= 5 && targetCell.y <= 7;
    }
    return false;
}

function isSelectedMarkCell(cell) {
    return gameState.selectedMarkCells.some(markCell => markCell.x === cell.x && markCell.y === cell.y);
}

function isValidCoachActionTarget(action, actorCell, targetCell) {
    if (!isValidCommandActionTarget(action, actorCell, targetCell)) return false;
    if (action.startsWith('mark')) {
        return !isSelectedMarkCell(targetCell);
    }
    return true;
}

function resolveCommandActionTarget(targetCell) {
    const card = gameState.selectedCard;
    const actorCell = gameState.selectedPlayer;
    const action = gameState.commandActivation.action;
    const team = gameState.currentTurn;
    recordUndoSnapshot(`${action} target at (${targetCell.x}, ${targetCell.y})`, team);

    if (action.startsWith('mark')) {
        const count = parseInt(action.split(' ')[1], 10) || 2;
        const alreadySelected = gameState.selectedMarkCells.some(cell => cell.x === targetCell.x && cell.y === targetCell.y);
        if (alreadySelected) {
            gameState.selectedMarkCells = gameState.selectedMarkCells.filter(cell => !(cell.x === targetCell.x && cell.y === targetCell.y));
        } else if (gameState.selectedMarkCells.length < count) {
            gameState.selectedMarkCells.push(targetCell);
        }
        if (gameState.selectedMarkCells.length >= count) {
            applyCommandMark(card, actorCell, gameState.selectedMarkCells);
        } else {
            render();
        }
        return;
    }

    if (action === 'tackle') {
        executeCommandTackle(actorCell, targetCell);
        completeCardPlay(card, team);
        return;
    }

    if (action === 'dribble') {
        removeMarkFromCell(targetCell, team === 'player' ? 'ai' : 'player');
        log(`Dribble: removed pressure from (${targetCell.x}, ${targetCell.y}).`);
        completeCardPlay(card, team);
        return;
    }

    if (['pass lane', 'pass inside', 'pass outside'].includes(action)) {
        executeZonePass(actorCell, targetCell);
        completeCardPlay(card, team);
        return;
    }

    if (action === 'cross') {
        executeCross(actorCell, targetCell);
        completeCardPlay(card, team);
        return;
    }

    if (action === 'clear') {
        executeClear(actorCell, targetCell);
        completeCardPlay(card, team);
        return;
    }

    if (action === 'header') {
        const headerResult = executeHeader(actorCell, targetCell);
        if (headerResult === true || headerResult === 'pending' || gameState.goalKickPending || gameState.kickoffPending) return;
        completeCardPlay(card, team);
        return;
    }

    if (action === 'shoot') {
        const shotResult = executeZoneShot(actorCell, targetCell);
        if (shotResult === true || shotResult === 'pending' || gameState.goalKickPending || gameState.kickoffPending) return;
        completeCardPlay(card, team);
    }
}

function applyCommandMark(card, defenderCell, zones) {
    gameState.defensiveMarks = gameState.defensiveMarks.filter(mark =>
        !(mark.team === gameState.currentTurn && mark.defender.x === defenderCell.x && mark.defender.y === defenderCell.y)
    );
    gameState.defensiveMarks.push({
        team: gameState.currentTurn,
        defender: { id: defenderCell.player.id, x: defenderCell.x, y: defenderCell.y },
        zones: zones.map(zone => ({ x: zone.x, y: zone.y })),
        source: gameState.commandActivation.action,
        createdStep: gameState.resolutionStep
    });
    log(`${card.name}: marked ${zones.length} hex${zones.length === 1 ? '' : 'es'}.`);
    completeCardPlay(card, gameState.currentTurn);
}

function removeMarkFromCell(cell, markingTeam) {
    gameState.defensiveMarks = gameState.defensiveMarks
        .map(mark => {
            if (mark.team !== markingTeam) return mark;
            return {
                ...mark,
                zones: mark.zones.filter(zone => !(zone.x === cell.x && zone.y === cell.y))
            };
        })
        .filter(mark => mark.zones.length > 0);
}

function countDefendersBetween(fromCell, toCell, defendingTeam) {
    return getHexLine(fromCell.x, fromCell.y, toCell.x, toCell.y)
        .filter(cell => cell.player && cell.player.team === defendingTeam)
        .length;
}

function getBlockedLineCells(fromCell, toCell, defendingTeam) {
    const blocked = new Map();
    getHexLine(fromCell.x, fromCell.y, toCell.x, toCell.y).forEach(cell => {
        if (cell.player && cell.player.team === defendingTeam) {
            blocked.set(`${cell.x},${cell.y}`, cell);
            return;
        }
        if (isMarkedByTeam(cell, defendingTeam)) {
            blocked.set(`${cell.x},${cell.y}`, cell);
        }
    });
    return [...blocked.values()];
}

function getPassBlockInfo(fromCell, toCell, defendingTeam) {
    const lineCells = getHexLine(fromCell.x, fromCell.y, toCell.x, toCell.y);
    const occupiedDefenders = [];
    const markedCells = [];
    const blocked = new Map();

    lineCells.forEach((cell, index) => {
        if (cell.player && cell.player.team === defendingTeam) {
            occupiedDefenders.push({ cell, index });
            blocked.set(`${cell.x},${cell.y}`, cell);
        }
        if (isMarkedByTeam(cell, defendingTeam)) {
            markedCells.push({ cell, index });
            blocked.set(`${cell.x},${cell.y}`, cell);
        }
    });

    return {
        blockedCells: [...blocked.values()],
        occupiedDefenders,
        markedCells
    };
}

function clearBallFromAllCells() {
    const ballCell = getCellWithBall();
    if (ballCell) {
        ballCell.ball = false;
    }
}

function resolveFailedPass(passerCell, targetCell, defendingTeam, passInfo) {
    const nearestDefender = passInfo.occupiedDefenders[0]?.cell;
    if (nearestDefender) {
        clearAirborneBall();
        clearBallFromAllCells();
        nearestDefender.ball = true;
        setControlledPossession(defendingTeam);
        log(`Pass intercepted by defender at (${nearestDefender.x}, ${nearestDefender.y}).`);
        return { success: false, turnover: true, forfeitAction: true };
    }

    const markedCell = passInfo.markedCells[0]?.cell;
    if (markedCell) {
        clearAirborneBall();
        clearBallFromAllCells();
        markedCell.ball = true;

        if (markedCell.player) {
            setControlledPossession(markedCell.player.team);
            const retained = markedCell.player.team === passerCell.player?.team;
            log(`Pass deflects to marked hex (${markedCell.x}, ${markedCell.y}); ${markedCell.player.team === 'player' ? 'Blue' : 'Red'} recovers possession.`);
            return { success: false, turnover: !retained, forfeitAction: true };
        }

        setLoosePossession(defendingTeam);
        log(`Pass deflects loose into marked hex (${markedCell.x}, ${markedCell.y}).`);
        return { success: false, turnover: true, loose: true, forfeitAction: true };
    }

    log('Pass failed. Ball stays with the passer for now.');
    return { success: false, forfeitAction: true };
}

function countMarkersOnCell(cell, markingTeam) {
    return gameState.defensiveMarks.filter(mark =>
        mark.team === markingTeam &&
        mark.zones.some(zone => zone.x === cell.x && zone.y === cell.y)
    ).length;
}

function rollD6Required(label, requiredRoll, modifier = 0, autoIfUnmodified = false) {
    return rollD6Result(label, requiredRoll, modifier, autoIfUnmodified).success;
}

function rollD6Result(label, requiredRoll, modifier = 0, autoIfUnmodified = false) {
    const finalRequired = requiredRoll + modifier;
    if (autoIfUnmodified && modifier === 0) {
        log(`${label}: unimpeded, automatic success.`);
        return { success: true, automatic: true, required: finalRequired, roll: null, margin: null };
    }
    if (finalRequired > 6) {
        log(`${label}: needs ${finalRequired}+ on d6. Automatic fail.`);
        return { success: false, automatic: true, required: finalRequired, roll: null, margin: null };
    }
    const roll = Math.floor(Math.random() * 6) + 1;
    const success = roll >= finalRequired;
    log(`${label}: d6 ${roll}, needs ${finalRequired}+. ${success ? 'Success' : 'Fail'}.`);
    return { success, automatic: false, required: finalRequired, roll, margin: roll - finalRequired };
}

function rollD6Check(label, penalty) {
    return rollD6Required(label, 1, penalty, penalty === 0);
}

function executeZonePass(passerCell, targetCell) {
    const team = gameState.currentTurn;
    const defendingTeam = team === 'player' ? 'ai' : 'player';
    if (!isOnsidePassTarget(targetCell, team)) {
        log(`Offside: pass target at (${targetCell.x}, ${targetCell.y}) is beyond the last defender line.`);
        return { success: false, forfeitAction: true };
    }
    const passInfo = getPassBlockInfo(passerCell, targetCell, defendingTeam);
    if (rollD6Required('Pass', 1, passInfo.blockedCells.length * 2, passInfo.blockedCells.length === 0)) {
        clearAirborneBall();
        getCellWithBall().ball = false;
        targetCell.ball = true;
        setControlledPossession(targetCell.player.team);
        log(`Pass complete to (${targetCell.x}, ${targetCell.y}).`);
        return { success: true };
    } else {
        return resolveFailedPass(passerCell, targetCell, defendingTeam, passInfo);
    }
}

function getReboundCandidates(shooterCell, goalCell, team) {
    const fieldDirection = team === 'player' ? -1 : 1;
    const candidates = getAdjacentCells(goalCell.x, goalCell.y)
        .filter(cell => cell.x === goalCell.x + fieldDirection);
    if (candidates.length <= 1) return candidates;

    const bestDistance = Math.min(...candidates.map(cell => distance(shooterCell.x, shooterCell.y, cell.x, cell.y)));
    return candidates.filter(cell => distance(shooterCell.x, shooterCell.y, cell.x, cell.y) === bestDistance);
}

function clearBallFromPitch() {
    gameState.field.forEach(cell => {
        cell.ball = false;
    });
    clearAirborneBall();
}

function getTeamPlannedCards(team) {
    if (team === gameState.offenseTeam) return gameState.plannedOffense;
    if (team === gameState.defenseTeam) return gameState.plannedDefense;
    return [];
}

function removePlannedCardForTeam(card, team) {
    if (team === gameState.offenseTeam) {
        gameState.plannedOffense = gameState.plannedOffense.filter(plannedCard => plannedCard.uid !== card.uid);
    }
    if (team === gameState.defenseTeam) {
        gameState.plannedDefense = gameState.plannedDefense.filter(plannedCard => plannedCard.uid !== card.uid);
    }
}

function canCardActivatePlayerForAction(card, cell, team, action) {
    if (!card?.command || !cell?.player || cell.player.team !== team) return false;
    const command = card.command;
    const zones = getPitchZones(cell, team);
    if (command.mode === 'third' && zones.third !== command.third) return false;
    const mainLane = command.lanes.find(lane => zones.lanes.includes(lane));
    if (!mainLane) return false;
    const actions = command.actions[zones.third] || [];
    return actions.includes(action);
}

function findEmergencyClearOption(defenderCells, defendingTeam) {
    const plannedCards = getTeamPlannedCards(defendingTeam)
        .filter(card => !gameState.selectedCard || card.uid !== gameState.selectedCard.uid);
    for (const defenderCell of defenderCells) {
        const card = plannedCards.find(plannedCard =>
            canCardActivatePlayerForAction(plannedCard, defenderCell, defendingTeam, 'clear')
        );
        if (card) {
            return { card, defenderCell };
        }
    }
    return null;
}

function movePlayerForRebound(fromCell, toCell) {
    if (!fromCell || !toCell || !fromCell.player || toCell.player) return null;
    const player = fromCell.player;
    fromCell.player = null;
    fromCell.ball = false;
    toCell.player = player;
    toCell.ball = true;
    setControlledPossession(player.team);
    return toCell;
}

function resolveReboundAtCell(reboundCell, shootingTeam, defendingTeam) {
    clearBallFromPitch();
    reboundCell.ball = true;

    if (reboundCell.player) {
        setControlledPossession(reboundCell.player.team);
        log(`Rebound drops to occupied hex (${reboundCell.x}, ${reboundCell.y}); ${reboundCell.player.team === 'player' ? 'Blue' : 'Red'} gains possession.`);
        return;
    }

    setLoosePossession(shootingTeam);
    const playersByDistance = gameState.field
        .filter(cell => cell.player)
        .map(cell => ({ cell, distance: distance(cell.x, cell.y, reboundCell.x, reboundCell.y) }))
        .sort((a, b) => a.distance - b.distance);

    if (playersByDistance.length === 0) {
        log(`Rebound loose at (${reboundCell.x}, ${reboundCell.y}).`);
        return;
    }

    const bestDistance = playersByDistance[0].distance;
    const tied = playersByDistance.filter(entry => entry.distance === bestDistance).map(entry => entry.cell);
    const attackingTies = tied.filter(cell => cell.player.team === shootingTeam);
    const defendingTies = tied.filter(cell => cell.player.team === defendingTeam);

    if (attackingTies.length > 0 && defendingTies.length > 0) {
        const clearOption = findEmergencyClearOption(defendingTies, defendingTeam);
        if (clearOption) {
            removePlannedCardForTeam(clearOption.card, defendingTeam);
            discardCardOnce(clearOption.card, defendingTeam);
            const defenderAtRebound = movePlayerForRebound(clearOption.defenderCell, reboundCell);
            log(`Tied rebound: defense spends ${clearOption.card.name} for emergency CLEAR.`);
            executeClear(defenderAtRebound || reboundCell, getDefaultClearTarget(defenderAtRebound || reboundCell, defendingTeam));
            return;
        }

        const attackerAtRebound = movePlayerForRebound(attackingTies[0], reboundCell);
        log(`Tied rebound: no legal CLEAR spent. ${shootingTeam === 'player' ? 'Blue' : 'Red'} recovers at (${reboundCell.x}, ${reboundCell.y}).`);
        if (!attackerAtRebound) setControlledPossession(shootingTeam);
        return;
    }

    const winner = tied[0];
    const winnerTeam = winner.player.team;
    const winnerAtRebound = movePlayerForRebound(winner, reboundCell);
    if (winnerAtRebound) {
        log(`Rebound recovered by ${winnerTeam === 'player' ? 'Blue' : 'Red'} at (${reboundCell.x}, ${reboundCell.y}).`);
    }
}

function resolveShotRebound(shooterCell, goalCell, shootingTeam, defendingTeam) {
    const candidates = getReboundCandidates(shooterCell, goalCell, shootingTeam);
    if (candidates.length === 0) {
        log('Near miss, but no legal rebound hex found. Goal kick CLEAR restart.');
        startGoalKickClear(defendingTeam, goalCell);
        return false;
    }

    if (candidates.length > 1) {
        gameState.pendingRebound = {
            shootingTeam,
            defendingTeam,
            candidates: candidates.map(cell => ({ x: cell.x, y: cell.y })),
            card: gameState.selectedCard,
            resolvingTeam: gameState.currentTurn
        };
        log('Near miss: choose the rebound hex.');
        render();
        return true;
    }

    log('Near miss: rebound chance.');
    resolveReboundAtCell(candidates[0], shootingTeam, defendingTeam);
    return false;
}

function chooseReboundCell(cell) {
    if (!gameState.pendingRebound) return;
    const pending = gameState.pendingRebound;
    const legal = pending.candidates.some(candidate => candidate.x === cell.x && candidate.y === cell.y);
    if (!legal) return;
    recordUndoSnapshot(`choosing rebound at (${cell.x}, ${cell.y})`, pending.resolvingTeam);

    gameState.pendingRebound = null;
    resolveReboundAtCell(cell, pending.shootingTeam, pending.defendingTeam);
    if (pending.card && gameState.selectedCard && pending.card.uid === gameState.selectedCard.uid) {
        completeCardPlay(gameState.selectedCard, pending.resolvingTeam);
    }
    render();
}

function executeZoneShot(shooterCell, goalCell, options = {}) {
    const team = gameState.currentTurn;
    const defendingTeam = team === 'player' ? 'ai' : 'player';
    const blockedCells = getBlockedLineCells(shooterCell, goalCell, defendingTeam);
    const effectiveBlocks = Math.max(0, blockedCells.length - (options.ignoreBlocks || 0));
    const markers = countMarkersOnCell(shooterCell, defendingTeam);
    const cardPenalty = getShotRequiredRollModifier(gameState.selectedCard, shooterCell);
    const modifier = effectiveBlocks + markers + cardPenalty;
    const shotRoll = rollD6Result(options.label || 'Shot', 4, modifier);
    if (shotRoll.success) {
        if (team === 'player') gameState.playerScore++;
        else gameState.aiScore++;
        log(`${team === 'player' ? 'Player' : 'AI'} scores!`);
        restartAfterGoal(team);
        return true;
    } else if (!shotRoll.automatic && shotRoll.margin === -1) {
        return resolveShotRebound(shooterCell, goalCell, team, defendingTeam) ? 'pending' : false;
    } else {
        log('Shot saved/blocked. Goal kick CLEAR restart.');
        startGoalKickClear(defendingTeam, goalCell);
        return false;
    }
}

function executeCross(actorCell, targetCell) {
    const ballCell = getCellWithBall();
    if (ballCell) {
        ballCell.ball = false;
    }
    targetCell.ball = true;
    setLoosePossession(gameState.currentTurn);
    gameState.airborneBall = {
        x: targetCell.x,
        y: targetCell.y,
        crossingTeam: gameState.currentTurn,
        createdStep: gameState.resolutionStep
    };
    log(`Cross: airborne ball placed at (${targetCell.x}, ${targetCell.y}).`);
}

function getDefaultGoalCellForTeam(team) {
    return getCell(team === 'player' ? 16 : 0, 6);
}

function getDefaultClearTarget(actorCell, team) {
    const candidates = gameState.field
        .filter(cell => isInClearFan(actorCell, cell, team))
        .sort((a, b) => {
            const distanceDiff = distance(actorCell.x, actorCell.y, b.x, b.y) - distance(actorCell.x, actorCell.y, a.x, a.y);
            if (distanceDiff !== 0) return distanceDiff;
            return Math.abs(a.y - 6) - Math.abs(b.y - 6);
        });
    return candidates[0] || actorCell;
}

function executeHeader(actorCell, airborneCell) {
    const team = gameState.currentTurn;
    const isOffensiveHeader = gameState.resolvingRole === 'offense' || (!gameState.resolvingPlannedCard && team === gameState.offenseTeam);
    airborneCell.ball = false;
    clearAirborneBall();

    if (isOffensiveHeader) {
        actorCell.ball = true;
        const goalCell = getDefaultGoalCellForTeam(team);
        log(`Header: attacking header toward goal.`);
        return executeZoneShot(actorCell, goalCell, { ignoreBlocks: 1, label: 'Header shot' });
    }

    actorCell.ball = true;
    const clearTarget = getDefaultClearTarget(actorCell, team);
    log(`Header: defensive header clears the airborne ball.`);
    executeClear(actorCell, clearTarget);
    return false;
}

function executeClear(actorCell, targetCell) {
    const ballCell = getCellWithBall();
    if (ballCell) {
        ballCell.ball = false;
    }
    clearAirborneBall();

    targetCell.ball = true;
    if (targetCell.player) {
        setControlledPossession(targetCell.player.team);
        log(`Clear controlled: ${targetCell.player.team === 'player' ? 'Blue' : 'Red'} player at (${targetCell.x}, ${targetCell.y}) gains possession.`);
    } else {
        setLoosePossession(gameState.goalKickPending ? gameState.currentTurn : gameState.offenseTeam);
        log(`Clear to open space: ball is uncontrolled at (${targetCell.x}, ${targetCell.y}).`);
    }
}

function executePressTackle(card, targetCell) {
    const team = gameState.currentTurn;
    const effect = getActiveCardEffect(card, team);
    const ballCell = getCellWithBall();

    if (!ballCell) {
        log('No ball carrier to press!');
        return;
    }

    if (targetCell !== ballCell) {
        movePlayer(gameState.selectedPlayer, targetCell, { recordUndo: true, context: 'press-tackle' });
        log(`${effect.name}: moved defender to (${targetCell.x}, ${targetCell.y})`);
    }

    const tackler = targetCell === ballCell ? gameState.selectedPlayer : targetCell;
    if (distance(tackler.x, tackler.y, ballCell.x, ballCell.y) > 1) {
        log(`${effect.name}: defender is not close enough to tackle.`);
    } else {
        stealBall(tackler, effect.success);
    }
}

function shouldRecordUndoForTeam(team = gameState.currentTurn) {
    return gameState.manualControlMode || team === 'player';
}

function cloneForUndo(value) {
    return JSON.parse(JSON.stringify(value));
}

function findCardByUid(uid) {
    if (!uid) return null;
    const piles = [
        gameState.playerHand,
        gameState.aiHand,
        gameState.playerDeck,
        gameState.aiDeck,
        gameState.playerDiscard,
        gameState.aiDiscard,
        gameState.plannedOffense,
        gameState.plannedDefense,
        gameState.market,
        [gameState.playerCoach, gameState.aiCoach, gameState.selectedCard].filter(Boolean)
    ];
    return piles.flat().find(card => card && card.uid === uid) || null;
}

function relinkStateReferences() {
    if (gameState.selectedPlayer?.x !== undefined && gameState.selectedPlayer?.y !== undefined) {
        gameState.selectedPlayer = getCell(gameState.selectedPlayer.x, gameState.selectedPlayer.y);
    }
    if (gameState.selectedCard?.uid) {
        gameState.selectedCard = findCardByUid(gameState.selectedCard.uid) || gameState.selectedCard;
    }
    gameState.selectedMarkCells = (gameState.selectedMarkCells || [])
        .map(cell => getCell(cell.x, cell.y))
        .filter(Boolean);
}

function makeUndoSnapshot(label) {
    const { undoHistory, coachOptions, ...state } = gameState;
    return {
        label,
        state: cloneForUndo(state)
    };
}

function recordUndoSnapshot(label, team = gameState.currentTurn) {
    if (!shouldRecordUndoForTeam(team)) return;
    gameState.undoHistory.push(makeUndoSnapshot(label));
    if (gameState.undoHistory.length > 100) {
        gameState.undoHistory.shift();
    }
}

function restoreUndoSnapshot(snapshot) {
    Object.keys(gameState).forEach(key => {
        if (key !== 'undoHistory') delete gameState[key];
    });
    Object.assign(gameState, cloneForUndo(snapshot.state));
    gameState.undoHistory = gameState.undoHistory || [];
    gameState.gameLog = gameState.gameLog || [];
    gameState.coachOptions = [];
    relinkStateReferences();
}

function renderLog() {
    const logElement = document.getElementById('game-log');
    if (!logElement) return;
    logElement.innerHTML = '';
    (gameState.gameLog || []).slice(0, 20).forEach(entry => {
        const p = document.createElement('p');
        p.textContent = entry;
        logElement.appendChild(p);
    });
}

function downloadGameLog() {
    const lines = (gameState.gameLog || []).slice().reverse();
    const text = [
        `Futbol '99 playtest log`,
        `Exported: ${new Date().toLocaleString()}`,
        `Score: Blue ${gameState.playerScore} - Red ${gameState.aiScore}`,
        `Phase: ${gameState.gamePhase}`,
        '',
        ...lines
    ].join('\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `futbol-99-log-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.txt`;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
}

function undoLastChange() {
    const snapshot = gameState.undoHistory.pop();
    if (!snapshot) {
        undoLastMove();
        return;
    }
    restoreUndoSnapshot(snapshot);
    log(`Undid ${snapshot.label}.`);
    render();
}

function log(message) {
    if (!gameState.gameLog) gameState.gameLog = [];
    gameState.gameLog.unshift(message);
    while (gameState.gameLog.length > 200) {
        gameState.gameLog.pop();
    }
    renderLog();
}

const STARTER_CARDS = [

        defensive: ['mark 2', 'clear'],
        midfield: ['dribble'],
        attacking: ['cross']
    })
];

const MARKET_CARDS = [];

function createLaneCommandCard(id, name, lane, count, actions, options = {}) {
    return createCommandCard(id, name, {
        mode: 'lane',
        lanes: [lane],
        count: options.supportMove ? count - options.supportMove.count : count,
        displayName: options.displayName || null,
        supportLabel: options.supportLabel || (options.supportMove ? name : null),
        supportMove: options.supportMove || null,
        actions,
        actionLabels: options.actionLabels || {}
    });
}

function createSplitLaneCommandCard(id, name, lanes, actions, options = {}) {
    return createCommandCard(id, name, {
        mode: 'split-lane',
        lanes,
        perLane: 1,
        actions,
        actionLabels: options.actionLabels || {}
    });
}

function createThirdCommandCard(id, name, third, actions, options = {}) {
    return createCommandCard(id, name, {
        mode: 'third',
        third,
        lanes: ['left', 'center', 'right'],
        perLane: 1,
        actions,
        actionLabels: options.actionLabels || {}
    });
}

function createCommandCard(id, name, command) {
    const description = getCommandDescription(command);
    return {
        id,
        name,
        type: CARD_TYPES.COMMAND,
        cost: 0,
        description,
        effect: { type: 'command', moveRange: 4, command },
        command
    };
}

function getCommandDescription(command) {
    if (command.mode === 'lane') {
        if (command.supportMove) {
            return `Activate ${command.supportLabel}. Support activation moves only.`;
        }
        return `Activate up to ${command.count} in ${command.lanes[0].toUpperCase()}. Move first, then 1 acts.`;
    }
    if (command.mode === 'split-lane') {
        return `Activate 1 in LEFT and 1 in RIGHT. Move first, then 1 acts.`;
    }
    return `Activate 1 per lane in ${command.third.toUpperCase()}. Move first, then 1 acts.`;
}

// ========================================
// DECK MANAGEMENT
// ========================================

function createStarterDeck() {
    return STARTER_CARDS.map(card => ({...card, uid: generateId()}));
}

function createMarketDeck() {
    // Market upgrades are paused while the new 12-card command deck is being prototyped.
    const deck = [];
    MARKET_CARDS.forEach(card => {
        for (let i = 0; i < 3; i++) {
            deck.push({...card, uid: generateId()});
        }
    });
    // Shuffle the deck
    return deck.sort(() => Math.random() - 0.5);
}

function drawMarketCard() {
    if (gameState.marketDeck.length === 0) {
        log('Market deck is empty!');
        return null;
    }
    return gameState.marketDeck.pop();
}

function getInitialMarketCards() {
    if (MARKET_CARDS.length === 0) {
        return [];
    }

    // Draw 5 cards from the shuffled market deck
    const initialCards = [];
    for (let i = 0; i < MARKET_SIZE; i++) {
        const card = drawMarketCard();
        if (card) initialCards.push(card);
    }
    return initialCards;
}

function discardCardForCoin(card, team = 'player') {
    // Any non-economy card can be discarded for 1 coin
    if (card.type === CARD_TYPES.ECONOMY) {
        log("Can't discard economy cards for coins - just play them!");
        return false;
    }
   
    // Can't discard the active coach card
    const activeCoach = team === 'player' ? gameState.playerCoach : gameState.aiCoach;
    if (activeCoach && card.uid === activeCoach.uid) {
        log("Can't discard your active coach card!");
        return false;
    }
   
    // No confirmation needed - just discard
   
    gameState.coins += 1;
    const hand = team === 'player' ? gameState.playerHand : gameState.aiHand;
    const discard = team === 'player' ? gameState.playerDiscard : gameState.aiDiscard;
   
    const index = hand.findIndex(c => c.uid === card.uid);
    if (index !== -1) {
        hand.splice(index, 1);
        discard.push(card);
    }
   
    log(`${team === 'player' ? 'You' : 'AI'} discarded ${card.name} for 1 coin`);
    render();
    return true;
}

function discardCard(card, team) {
    const hand = team === 'player' ? gameState.playerHand : gameState.aiHand;
    const discard = team === 'player' ? gameState.playerDiscard : gameState.aiDiscard;
   
    const index = hand.findIndex(c => c.uid === card.uid);
    if (index !== -1) {
        hand.splice(index, 1);
    }
    discard.push(card);
}

function discardCardOnce(card, team) {
    if (!card) return;
    const discard = team === 'player' ? gameState.playerDiscard : gameState.aiDiscard;
    if (!discard.some(discarded => discarded.uid === card.uid)) {
        discardCard(card, team);
    }
}

function removeCardFromHand(card, team) {
    const hand = team === 'player' ? gameState.playerHand : gameState.aiHand;
    const index = hand.findIndex(c => c.uid === card.uid);
    if (index !== -1) {
        hand.splice(index, 1);
        return true;
    }
    return false;
}
